server {
    listen 80;
    server_name localhost;

    # Sicherheitsheader für Browser-Härtung
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' https:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'" always;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;

        # RADIKALES ANTI-CACHE SETUP
        # Deaktiviert ETags komplett
        etag off;
        # Verhindert jegliche Speicherung im Browser oder in Proxies
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        # Verhindert, dass der Browser die Datei für die Zukunft speichert
        if_modified_since off;
    }

    # Optional: Proxy für API, falls wir alles über denselben Port servieren wollen
    # location /api {
    #     proxy_pass http://backend:8000;
    # }
}
