services:
  backend:
    container_name: heizungsleser-v2-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://heitleser_user:heitleser_pass@heizungsleser-v2-postgres:5432/heitleser_db
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - heizungsleser-v2-net
      - proxy

  db:
    container_name: heizungsleser-v2-postgres
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: heitleser_user
      POSTGRES_PASSWORD: heitleser_pass
      POSTGRES_DB: heitleser_db
    ports:
      - "5432:5432"
    volumes:
      - heizungsleser-v2-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U heitleser_user -d heitleser_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - heizungsleser-v2-net

  frontend:
    container_name: heizungsleser-v2-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3001:80"
    environment:
      VITE_API_BASE_URL: /api/v1
    depends_on:
      - backend
    networks:
      - heizungsleser-v2-net
      - proxy

networks:
  heizungsleser-v2-net:
    name: heizungsleser-v2-net
    driver: bridge
  proxy:
    external: true

volumes:
  heizungsleser-v2-postgres-data:
    name: heizungsleser-v2-postgres-data
