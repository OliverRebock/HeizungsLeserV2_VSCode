services:
  backend:
    container_name: heizungsleser-v2-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - heizungsleser-v2-net
      - proxy

  db:
    container_name: heizungsleser-v2-postgres
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - heizungsleser-v2-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - heizungsleser-v2-net

  frontend:
    container_name: heizungsleser-v2-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3001:80"
    environment:
      VITE_API_BASE_URL: /api/v1
    depends_on:
      - backend
    networks:
      - heizungsleser-v2-net
      - proxy

networks:
  heizungsleser-v2-net:
    name: heizungsleser-v2-net
    driver: bridge
  proxy:
    external: true

volumes:
  heizungsleser-v2-postgres-data:
    name: heizungsleser-v2-postgres-data
